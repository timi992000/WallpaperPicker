name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        run: |
          sudo rm -rf /Library/Developer/CoreSimulator
          sudo rm -rf ~/Library/Developer/Xcode/DerivedData
          brew cleanup --prune=all
          df -h
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: chmod +x build.sh && ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: WallpaperPicker.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: chmod +x build.sh && ./build.sh
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: dist/WallpaperPicker

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - shell: pwsh
        run: .\build.ps1
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist\WallpaperPicker.exe

  release:
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate tag
        id: tag
        run: echo "name=build-$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            Automated build from [`${{ github.sha }}`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})

            | Platform | File |
            |---|---|
            | macOS | `WallpaperPicker.dmg` |
            | Linux | `WallpaperPicker` |
            | Windows | `WallpaperPicker.exe` |
          files: |
            artifacts/macos/WallpaperPicker.dmg
            artifacts/linux/WallpaperPicker
            artifacts/windows/WallpaperPicker.exe
